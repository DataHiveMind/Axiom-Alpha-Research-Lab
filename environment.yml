name: axiom-alpha
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python=3.10
  - pip
  - conda
  
  # Core Quant & Data Science Stack
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  
  # Deep Learning Engine
  - pytorch
  - torchvision
  - torchaudio
  - pytorch-cuda=11.8  # Adjust to your local NVIDIA drivers
  
  # Database Drivers
  - pymongo
  
  # Research & Development
  - jupyterlab
  - ipykernel
  - pytest
  
  - pip:
      # High-Frequency Data Backend
      - pykx
      
      # Quantitative Finance & Derivatives Pricing
      - QuantLib
      
      # Deep Reinforcement Learning Ecosystem
      - pytorch-lightning
      - gymnasium
      - torchrl
      - tensordict
      - ray[rllib,tune]
      
      # MLOps & Tracking
      - mlflow
      - psycopg2-binary  # Required for MLflow PostgreSQL backend
      
      # Automation & Integration
      - notion-client
      - requests
      - python-dotenv
      
      # Dashboard & Telemetry
      - streamlit
      - plotly      # The industry standard for interactive financial charting