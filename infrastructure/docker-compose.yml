version: '3.8'

services:
  # ----------------------------------------
  # Telemetry Database (Live Execution Tracking)
  # ----------------------------------------
  mongodb:
    image: mongo:6.0
    container_name: axiom_mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - axiom_net

  # ----------------------------------------
  # MLflow Metadata Backend (PostgreSQL)
  # ----------------------------------------
  mlflow-db:
    image: postgres:14
    container_name: axiom_mlflow_db
    restart: always
    environment:
      POSTGRES_USER: axiom_ml
      POSTGRES_PASSWORD: super_secure_password  # Update this in production
      POSTGRES_DB: mlflow_experiments
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - axiom_net

  # ----------------------------------------
  # MLflow Tracking Server
  # ----------------------------------------
  mlflow-server:
    image: bitnami/mlflow:latest
    container_name: axiom_mlflow_server
    restart: always
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_BACKEND_STORE_URI=postgresql://axiom_ml:super_secure_password@mlflow-db:5432/mlflow_experiments
      - MLFLOW_DEFAULT_ARTIFACT_ROOT=/mlruns
    volumes:
      - mlflow_artifacts:/mlruns
    depends_on:
      - mlflow-db
    networks:
      - axiom_net

networks:
  axiom_net:
    driver: bridge

volumes:
  mongo_data:
  pg_data:
  mlflow_artifacts: